
    <div class="login-page">
      <div class="login-card card-glass">
        <div class="text-center mb-4">
          <span style="font-size:3rem">🔧</span>
          <h2 class="mt-2" style="color:var(--text-primary);font-family:var(--font-heading)">Admin Login</h2>
        </div>
        <div class="mb-3">
          <label class="form-label" style="color:var(--text-secondary);font-size:0.85rem">Email</label>
          <input type="email" class="form-control" placeholder="admin&#64;fashionstore.com" [(ngModel)]="email">
        </div>
        <div class="mb-3">
          <label class="form-label" style="color:var(--text-secondary);font-size:0.85rem">Password</label>
          <input type="password" class="form-control" placeholder="Enter password" [(ngModel)]="password" (keyup.enter)="login()">
        </div>
        <button class="btn btn-primary-gradient w-100 py-3" (click)="login()" [disabled]="loading()">
          {{ loading() ? 'Logging in...' : 'Login' }}
        </button>
        @if (error()) {
          <div class="alert mt-3 py-2 text-center" style="background:rgba(248,81,73,0.1);border-color:var(--danger);color:var(--danger);border-radius:var(--radius-sm);font-size:0.85rem">{{ error() }}</div>
        }
        <hr style="border-color:var(--border-color);margin:24px 0">
        <div class="text-center">
          <a routerLink="/admin/register" style="color:var(--primary-light);font-size:0.85rem">Register as Admin →</a>
          <span style="color:var(--text-muted);margin:0 8px">|</span>
          <a routerLink="/login" style="color:var(--text-muted);font-size:0.85rem">User Login</a>
        </div>
      </div>
    </div>
