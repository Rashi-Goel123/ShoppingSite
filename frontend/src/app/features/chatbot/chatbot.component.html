
    <div class="chatbot-widget">
      @if (isOpen()) {
        <div class="chat-window">
          <!-- HEADER -->
          <div class="p-3 d-flex justify-content-between align-items-center" style="background:var(--accent-gradient);border-radius:var(--radius-lg) var(--radius-lg) 0 0">
            <div class="d-flex align-items-center gap-2">
              <span style="font-size:1.5rem">🤖</span>
              <div>
                <h6 style="margin:0;color:white;font-size:0.9rem;font-family:var(--font-body)">Fashion Assistant</h6>
                <span style="color:rgba(255,255,255,0.7);font-size:0.7rem">● Online</span>
              </div>
            </div>
            <button class="btn btn-sm" style="color:white;font-size:1.2rem" (click)="isOpen.set(false)">✕</button>
          </div>

          <!-- MESSAGES -->
          <div class="flex-grow-1 p-3 overflow-auto" style="background:var(--dark-secondary)" #chatBody>
            @for (msg of messages(); track $index) {
              <div class="mb-3" [class.text-end]="msg.sender === 'user'">
                <div class="chat-bubble" [class.user-bubble]="msg.sender === 'user'" [class.bot-bubble]="msg.sender === 'bot'">
                  {{ msg.message }}
                </div>
                <div style="font-size:0.65rem;color:var(--text-muted);margin-top:2px">
                  {{ msg.sender === 'bot' ? '🤖' : '👤' }} {{ formatTime(msg.timestamp) }}
                </div>
              </div>
            }
            @if (typing()) {
              <div class="mb-3">
                <div class="chat-bubble bot-bubble">
                  <span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
                </div>
              </div>
            }
          </div>

          <!-- INPUT -->
          <div class="p-3" style="border-top:1px solid var(--border-color)">
            <div class="input-group">
              <input type="text" class="form-control" placeholder="Ask me anything..." [(ngModel)]="input"
                     (keyup.enter)="send()" style="font-size:0.88rem;border-radius:var(--radius) 0 0 var(--radius)">
              <button class="btn btn-primary-gradient" (click)="send()" style="border-radius:0 var(--radius) var(--radius) 0;padding:8px 16px">
                ➤
              </button>
            </div>
            <div class="d-flex flex-wrap gap-1 mt-2">
              @for (q of quickReplies; track q) {
                <button class="btn btn-sm" style="background:rgba(108,92,231,0.1);color:var(--primary-light);font-size:0.72rem;border-radius:12px;padding:3px 10px"
                        (click)="input = q; send()">{{ q }}</button>
              }
            </div>
          </div>
        </div>
      }

      <button class="chat-toggle" (click)="isOpen.update(v => !v)">
        {{ isOpen() ? '✕' : '💬' }}
      </button>
    </div>
